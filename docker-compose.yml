services:
  postgres:
    image: postgres:16
    container_name: trustledger-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: trustledger123
      POSTGRES_DB: trustledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: